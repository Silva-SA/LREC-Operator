plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.lrec.operator'
    compileSdk 34

    defaultConfig {
        applicationId "com.lrec.operator"
        minSdk 21
        targetSdk 34
        versionCode 4
        versionName "4.0"
    }

    buildTypes {
        release {
            // ✅ تفعيل minify في الإصدار النهائي يُقلل حجم APK
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions { jvmTarget = '17' }

    buildFeatures { viewBinding true }

    // ✅ منع تكرار ملفات META-INF عند البناء
    packagingOptions {
        resources {
            excludes += '/META-INF/{AL2.0,LGPL2.1}'
        }
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.recyclerview:recyclerview:1.3.2'
    implementation 'androidx.media3:media3-exoplayer:1.2.1'
    implementation 'androidx.media3:media3-ui:1.2.1'

    // ── دعم فتح ملفات .lrec من مدير الملفات ──────────────────────
    implementation 'androidx.activity:activity-ktx:1.8.2'
    implementation 'androidx.documentfile:documentfile:1.0.1'

    // ملاحظة: commons-compress حُذفت لأن فك ضغط zlib يعتمد الآن
    // على java.util.zip.Inflater المدمجة في Android — لا حاجة لمكتبة خارجية
}
